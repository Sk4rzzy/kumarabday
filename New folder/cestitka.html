<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Čestitka</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a081c;
      color: #fff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      width: min(100%, 960px);
      max-height: calc(100vh - 40px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }
    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
    }
    p {
      line-height: 1.6;
      opacity: 0.92;
    }
    img {
      width: 100%;
      height: auto;
      max-height: calc(100vh - 240px);
      border-radius: 20px;
      margin-top: 18px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
      object-fit: contain;
    }
    a {
      color: #69f;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Čestitka :3</h1>
    <p>Javljaj kume ako treba da ti se ispise tekst imam ga pasted nedje pa ono...</p>
    <img src="assets/cestitka.jpg" alt="Čestitka" />
    <p><a href="index.html">Vrati se na igru</a></p>
  </div>
</body>
</html>
